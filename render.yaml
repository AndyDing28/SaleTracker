services:
  - type: web
    name: sale-tracker
    runtime: python
    plan: free
    rootDir: deprecated
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 app:app
    envVars:
      - key: SENDER_EMAIL
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
